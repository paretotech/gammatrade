{# Shared tab nav for the Settings section. Pass `active_tab` as one of:
   'rules' | 'logs' | 'kill'  #}
<nav class="flex gap-1 mb-6 border-b border-stone-200">
    {% for slug, label in [('rules', 'Rules'), ('risk', 'Risk limits'), ('broker', 'Broker'), ('logs', 'Event log'), ('kill', 'Kill switch')] %}
    <a href="/settings/{{ slug }}"
       class="px-3 py-2 -mb-px text-sm border-b-2 transition-colors
              {% if active_tab == slug %}border-emerald-600 text-stone-900 font-medium
              {% else %}border-transparent text-stone-500 hover:text-stone-900{% endif %}">
        {{ label }}
    </a>
    {% endfor %}
</nav>
